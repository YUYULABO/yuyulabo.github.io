name: Build and Deploy Portfolio

# トリガー: 手動実行 または webhookというイベントを受け取った時
on:
  workflow_dispatch:
  repository_dispatch:
    types: [update-microcms]

# 書き込み権限の付与（GitHub Pagesへのデプロイに必要）
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Pythonのセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. ビルドスクリプトの実行（ここでシークレットを渡す）
      - name: Run build script
        env:
          MICROCMS_SERVICE_ID: ${{ secrets.MICROCMS_SERVICE_ID }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
        run: python build.py

      # 4. 変更されたHTMLをコミットしてプッシュ
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto build from microCMS update"
          git push
