<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゆゆLABO | YUYU LABO</title>
    <style>
        /* 基本スタイルリセット */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #333; line-height: 1.6; background-color: #f9f9f9; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        /* ヘッダー・ナビゲーション */
        header { background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 1.2rem; font-weight: bold; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        
        /* ヒーローセクション */
        .hero { max-width: 1000px; margin: 40px auto; padding: 40px 20px; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .hero p { font-size: 1.1rem; color: #666; max-width: 600px; margin: 0 auto 30px; }
        .store-btn { display: inline-block; background: #e60012; color: #fff; padding: 12px 30px; border-radius: 25px; font-weight: bold; font-size: 1.1rem; transition: background 0.2s; }
        .store-btn:hover { background: #b8000e; text-decoration: none; }
        
        /* コンテンツ共通 */
        section { max-width: 1000px; margin: 60px auto; padding: 0 20px; scroll-margin-top: 80px; }
        section h2 { font-size: 1.8rem; margin-bottom: 30px; border-left: 5px solid #333; padding-left: 15px; }
        
        /* 作品紹介（グリッドレイアウト） */
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .work-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .work-card:hover { transform: translateY(-5px); }
        .work-img { width: 100%; height: 200px; background: #ddd; object-fit: cover; display: block; }
        .work-info { padding: 20px; }
        .work-info h3 { margin-bottom: 10px; font-size: 1.2rem; }
        .work-info p { color: #666; font-size: 0.9rem; }
        
        /* コンタクト（お問い合わせ） */
        .contact-container { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .contact-links { display: flex; justify-content: center; gap: 30px; margin-top: 20px; font-size: 1.1rem; }
        
        /* フッター */
        footer { text-align: center; padding: 40px 20px; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; margin-top: 80px; }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="nav-container">
            <div class="logo">ゆゆLABO</div>
            <nav>
                <ul>
                    <li><a href="#works">Works</a></li>
                    <li><a href="#contact">Contact</a></li>
                    <li><a href="https://jp.mercari.com/user/profile/161887003" target="_blank" style="color: #e60012; font-weight: bold;">Store</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ヒーローエリア -->
    <section class="hero">
        <h1>ご覧いただきありがとうございます。</h1>
        <p>個人で作成した3Dプリンタ製品やハンドメイド製品を販売しております。</p>
        <a href="https://jp.mercari.com/user/profile/161887003" target="_blank" class="store-btn">オンラインストアを見る</a>
    </section>

    <!-- 作品紹介セクション -->
    <section id="works">
        <h2>Works（作品紹介）</h2>
        <div class="work-grid">
            <!-- WORKS_START -->

    <div class="work-card">
        <img src="https://images.microcms-assets.io/assets/4f9c46a05edd487387191a5793430fda/2b28b667e907448aa0a615b49ed526e4/1000019380.jpg" alt="テスト" class="work-img">
        <div class="work-info">
            <h3>テスト</h3>
            <p><p>てすト投稿です</p></p>
        </div>
    </div>
    
<!-- WORKS_END -->
		</div>
    </section>

    <!-- コンタクトセクション -->
    <section id="contact">
        <h2>Contact（お問い合わせ）</h2>
        <div class="contact-container">
            <p>お仕事のご依頼や、作成物に関するお問い合わせは以下よりご連絡ください。</p>
			<div class="contact-links" style="flex-direction: column; gap: 10px; margin-top: 30px;">
                <p style="font-size: 1.3rem; font-weight: bold; letter-spacing: 1px;">
                    yuyulabo.store<span style="color: #e60012;">[at]</span>gmail.com
                </p>
                <p style="font-size: 0.9rem; color: #666;">
                    ※スパム対策のため、[at]を@に書き換えてお送りください。
                </p>
			</div>
        </div>
    </section>

    <!-- フッター -->
    <footer>
        <p>&copy; 2026 ゆゆLABO. All rights reserved.</p>
    </footer>
</body>
</html>
